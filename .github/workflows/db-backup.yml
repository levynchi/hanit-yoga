name: Weekly DB Backup

# External, off-platform safety net for the Railway PostgreSQL database.
# Runs pg_dump against Railway's public proxy URL and stores the dump as an
# artifact. Requires a repository secret DATABASE_PUBLIC_URL (see BACKUPS.md).

on:
  schedule:
    - cron: "0 3 * * 0" # Sundays 03:00 UTC
  workflow_dispatch: {}

jobs:
  pg_dump:
    runs-on: ubuntu-latest
    # Use the official PostgreSQL 17 image so pg_dump is preinstalled at the
    # right version. Debian-based (glibc) so actions/upload-artifact works.
    container: postgres:17
    steps:
      - name: Dump database
        env:
          DATABASE_PUBLIC_URL: ${{ secrets.DATABASE_PUBLIC_URL }}
        run: |
          if [ -z "$DATABASE_PUBLIC_URL" ]; then
            echo "DATABASE_PUBLIC_URL secret is not set. See BACKUPS.md (Part C)." >&2
            exit 1
          fi
          mkdir -p backups
          stamp=$(date -u +%Y%m%d-%H%M%S)
          pg_dump "$DATABASE_PUBLIC_URL" -Fc -f "backups/hanit-yoga-$stamp.dump"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup
          path: backups/*.dump
          retention-days: 30
          if-no-files-found: error
